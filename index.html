<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-commerce Store</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        #search,
        #category-select {
            padding: 6px 10px;
            margin-left: 10px;
        }

        .hero-slider {
            position: relative;
            width: 100%;
            max-height: 400px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .slide {
            display: none;
            width: 100%;
        }

        .slide.active {
            display: block;
        }

        .slide img {
            width: 100%;
            height: auto;
        }

        #product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .product-card {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .product-card h3 {
            margin: 10px 0 5px;
        }

        .product-card p {
            margin: 5px 0;
        }

        .product-card button {
            background: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 3px;
        }

        .product-card button:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <header>

        <h1>MyStore</h1>

        <div>

            <input type="text" id="search" placeholder="Search products...">

            <select id="category-select">

                <option value="All">All Categories</option>

                <option value="smartphones">Smartphones</option>

                <option value="laptops">Laptops</option>

                <option value="fragrances">Fragrances</option>

                <option value="skincare">Skincare</option>

                <option value="groceries">Groceries</option>

                <option value="home-decoration">Home Decoration</option>

                <option value="furniture">Furniture</option>

                <option value="tops">Tops</option>

                <option value="womens-dresses">Women Dresses</option>

                <option value="mens-shoes">Men Shoes</option>

                <option value="womens-shoes">Women Shoes</option>

                <option value="sunglasses">Sunglasses</option>

            </select>
            <a href="cart.html" style="color:white;text-decoration:none;margin-left:15px;">
                🛒 Cart (<span id="cart-count">0</span>)
            </a>
        </div>

    </header>

    <!-- Hero Slider -->

    <div class="hero-slider">

        <div class="slide active">
            <img src="https://picsum.photos/1200/400?random=1">
        </div>

        <div class="slide">
            <img src="https://picsum.photos/1200/400?random=2">
        </div>

        <div class="slide">
            <img src="https://picsum.photos/1200/400?random=3">
        </div>

    </div>

    <!-- Products -->

    <div id="product-container"></div>

    <script src="script.js"></script>

</body>

</html>
